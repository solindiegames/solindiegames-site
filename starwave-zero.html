<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starwave Zero - Solindie Games</title>
  <meta name="description" content="Play Starwave Zero in your browser.">
  <link rel="icon" href="assets/logo/mask_only.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (function () {
      if (localStorage.getItem("theme") === "light") {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="game-player-page">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo-link">
        <img src="assets/logo/mask_only.png" alt="Solindie Games" class="logo-img">
        <span class="logo-text">Solindie Games</span>
      </a>
      <div class="header-actions">
      <nav class="site-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="games.html" class="nav-link active">Games</a>
        <a href="about.html" class="nav-link">About</a>
      </nav>
      <button class="theme-toggle" type="button" aria-label="Switch to light theme" title="Switch to light theme">
        <svg class="theme-icon theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="theme-icon theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      </div>
    </div>
  </header>

  <main>
    <section class="section game-player">
      <div class="container game-player-shell">
        <a href="games.html" class="text-link">Back to Games</a>
        <h1 class="game-player-title">Starwave Zero</h1>
        <div class="game-frame">
          <iframe
            src="spaceshooter/"
            title="Starwave Zero"
            width="1920"
            height="1080"
            scrolling="no"
            tabindex="0"
            allow="autoplay; fullscreen; gamepad"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-copy">Solindie Games &copy; 2026</p>
      <div class="footer-links">
        <a href="about.html#contact">Contact</a>
        <a href="privacy.html">Privacy</a>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    (function () {
      var frame = document.querySelector(".game-frame iframe");
      if (!frame) return;

      frame.addEventListener("load", function () {
        frame.focus();
      });

      document.querySelector(".game-frame").addEventListener("click", function () {
        frame.focus();
      });
    })();
  </script>
</body>
</html>
